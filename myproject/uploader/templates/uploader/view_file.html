<!DOCTYPE html>
<html>
<head>
    <title>Данные файла: {{ file }}</title>
</head>
<body>
    <h1>Таблица из {{ file.file.name }}</h1>
    <table border="1">
        <thead>
            <tr>
                {% for col in columns %}
                    <th>{{ col }}</th>
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for row in table_data %}
                <tr>
                    {% for cell in row %}
                        <td>{{ cell|default:"—" }}</td>
                    {% endfor %}
                </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="{% url 'upload_file' %}">Загрузить другой файл</a>
</body>
</html>
