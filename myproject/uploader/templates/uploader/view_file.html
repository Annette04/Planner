<!DOCTYPE html>
<html>
<head>
    <title>Данные файла: {{ file }}</title>
</head>
<body>
    <h1>Таблица для {{ file_type }}</h1>
    {% if table_data %}
    <table border="1">
        <thead>
            <tr>
                {% for col in columns %}
                    <th>{{ col }}</th>
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for row in table_data %}
                <tr>
                    {% for cell in row %}
                        <td>{{ cell|default:"—" }}</td>
                    {% endfor %}
                </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p>Таблица ещё не создана.</p>
    {% endif %}
    <a href="{% url 'upload' file_type %}">Обновить файл</a><br>
    <a href="{% url 'home' %}">Назад</a>
</body>
</html>
